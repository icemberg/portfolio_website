services:
  db:
    image: postgres:15-alpine
    container_name: portfolio-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-portfolio}
      - POSTGRES_USER=${DB_USERNAME:-admin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  portfolio-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-website
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    environment:
      - SERVER_PORT=${SERVER_PORT:-8080}
      - DB_URL=postgresql://db:5432/${POSTGRES_DB:-portfolio}
      - DB_DRIVER=org.postgresql.Driver
      - DB_USERNAME=${DB_USERNAME:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - DB_DDL_AUTO=${DB_DDL_AUTO:-update}
      - DB_SHOW_SQL=${DB_SHOW_SQL:-true}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USERNAME=${EMAIL_USERNAME}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - EMAIL_AUTH=${EMAIL_AUTH}
      - EMAIL_STARTTLS_ENABLE=${EMAIL_STARTTLS_ENABLE}
      - EMAIL_STARTTLS_REQUIRED=${EMAIL_STARTTLS_REQUIRED}
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
